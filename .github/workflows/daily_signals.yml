name: Daily Signal Generation

on:
  schedule:
    - cron: '45 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run signal generator
        run: python generate_signals.py
      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest-signals --yes || true
          git push origin :refs/tags/latest-signals || true
          gh release create latest-signals daily_signal_sheet.xlsx \
            --title "Daily Signals - $(date +'%Y-%m-%d')" \
            --notes "Auto-generated $(date)"
